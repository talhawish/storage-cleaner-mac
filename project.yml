name: StorageCleaner

options:
  bundleIdPrefix: com.storagecleaner
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: 0.1.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: 6.0

targets:
  StorageCleaner:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_CFBundleDisplayName: Storage Cleaner
        PRODUCT_BUNDLE_IDENTIFIER: com.storagecleaner.developer

  StorageCleanerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: StorageCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.storagecleaner.developer.tests

  StorageCleanerUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    dependencies:
      - target: StorageCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.storagecleaner.developer.uitests

schemes:
  StorageCleaner:
    build:
      targets:
        StorageCleaner: all
        StorageCleanerTests:
          - test
        StorageCleanerUITests:
          - test
    test:
      gatherCoverageData: true
      targets:
        - name: StorageCleanerTests
          parallelizable: true
        - name: StorageCleanerUITests
          parallelizable: false
    analyze:
      config: Debug
    run:
      config: Debug
    archive:
      config: Release
