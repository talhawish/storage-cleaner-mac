strict: true

included:
  - StorageCleaner
  - StorageCleanerTests
  - StorageCleanerUITests

excluded:
  - .build

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - array_init
  - attributes
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - last_where
  - legacy_multiple
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - static_operator
  - test_case_accessibility
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - weak_delegate
  - yoda_condition

disabled_rules:
  - todo

line_length:
  warning: 120
  error: 140
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 620

type_body_length:
  warning: 350
  error: 350

function_body_length:
  warning: 50
  error: 80

cyclomatic_complexity:
  warning: 10
  error: 15

reporter: xcode
