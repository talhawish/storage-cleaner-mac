name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install static analysis tools
        run: brew install xcodegen swiftlint peripheryapp/periphery/periphery

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build with warnings as errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run tests
        run: swift test --parallel

      - name: Run UI tests
        run: xcodebuild test -project StorageCleaner.xcodeproj -scheme StorageCleaner -destination 'platform=macOS' -derivedDataPath .build/XcodeDerivedData

      - name: SwiftLint
        run: swiftlint lint --strict --no-cache

      - name: Periphery
        run: |
          xcodebuild build -quiet -project StorageCleaner.xcodeproj -scheme StorageCleaner -destination 'platform=macOS' -derivedDataPath .build/XcodeDerivedData CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=YES INDEX_ENABLE_DATA_STORE=YES
          periphery scan --strict --disable-update-check --skip-build --index-store-path .build/XcodeDerivedData/Index.noindex/DataStore

      - name: Xcode Analyzer
        run: xcodebuild analyze -project StorageCleaner.xcodeproj -scheme StorageCleaner -destination 'platform=macOS' -derivedDataPath .build/XcodeDerivedData CODE_SIGNING_ALLOWED=NO
